<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="160" viewBox="0 0 300 160">
  <rect width="100%" height="100%" fill="#1a1a2e" />
  <rect x="122.5" y="42.5" width="55" height="55" fill="gold" stroke="white" stroke-width="1">
  <animate attributeName="opacity" values="1;0.3" keyTimes="0;1" dur="1.5s" calcMode="spline" keySplines="0.42 0.0 0.58 1.0" fill="freeze" />
  <animateTransform attributeName="transform" type="rotate" values="0 150 70;360 150 70" keyTimes="0;1" dur="2.0s" begin="1.5s" fill="freeze" repeatCount="indefinite" additive="sum" />
</rect>
  <text x="150" y="140" font-size="10" font-family="sans-serif" font-style="normal" font-weight="normal" fill="gray" text-anchor="middle" dominant-baseline="middle">.fade(...).then().spin(...)</text>
</svg>